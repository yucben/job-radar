<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobRadar — 发现隐形好公司</title>
<meta name="description" content="打破求职信息差。按行业、融资、地区筛选优质企业。">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header" id="header">
  <div class="header-inner">
    <div class="header-brand">
      <span class="brand-icon">✦</span>
      <span class="brand-name">JobRadar</span>
    </div>
    <p class="brand-tagline">你不知道的好公司，这里都能找到</p>
    <div class="header-search">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="nameSearch" class="search-input"
             placeholder="搜索公司名称..."
             autocomplete="off"
             oninput="applyFilters()">
      <kbd class="search-hint">/</kbd>
    </div>
  </div>
</header>

<div class="stats-strip" id="statsStrip">
  <div class="stat-item">
    <span class="stat-value" id="companyCount">0</span>
    <span class="stat-label">公司</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <span class="stat-value" id="jobCount">0</span>
    <span class="stat-label">职位</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <span class="stat-value" id="resultCount">0</span>
    <span class="stat-label">匹配</span>
  </div>
  <span class="stats-active" id="activeFilterBadge" style="display:none"></span>
</div>

<main class="main-layout">
  <aside class="filter-sidebar" id="filterSidebar">
    <div class="sidebar-head">
      <span>筛选</span>
      <button class="btn-text" onclick="resetFilters()">清除</button>
    </div>

    <div class="filter-group" data-group="industry">
      <button class="filter-group-label" onclick="toggleFilterGroup(this)">
        行业
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="m6 9 6 6 6-6"/>
        </svg>
      </button>
      <div class="filter-chips" id="filter-industry"></div>
    </div>

    <div class="filter-group" data-group="funding">
      <button class="filter-group-label" onclick="toggleFilterGroup(this)">
        融资轮次
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="m6 9 6 6 6-6"/>
        </svg>
      </button>
      <div class="filter-chips scrollable" id="filter-funding"></div>
    </div>

    <div class="filter-group collapsed" data-group="year">
      <button class="filter-group-label" onclick="toggleFilterGroup(this)">
        成立时间
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="m6 9 6 6 6-6"/>
        </svg>
      </button>
      <div class="filter-chips scrollable" id="filter-year"></div>
    </div>

    <div class="filter-group" data-group="location">
      <button class="filter-group-label" onclick="toggleFilterGroup(this)">
        地区
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="m6 9 6 6 6-6"/>
        </svg>
      </button>
      <div class="filter-chips scrollable" id="filter-location"></div>
    </div>

    <div class="filter-group collapsed" data-group="advantage">
      <button class="filter-group-label" onclick="toggleFilterGroup(this)">
        标签
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="m6 9 6 6 6-6"/>
        </svg>
      </button>
      <div class="filter-chips" id="filter-advantage"></div>
    </div>

    <div class="filter-group collapsed" data-group="recruitment">
      <button class="filter-group-label" onclick="toggleFilterGroup(this)">
        招聘类型
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="m6 9 6 6 6-6"/>
        </svg>
      </button>
      <div class="filter-chips" id="filter-recruitment"></div>
    </div>

    <div class="filter-group collapsed" data-group="degree">
      <button class="filter-group-label" onclick="toggleFilterGroup(this)">
        学历要求
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="m6 9 6 6 6-6"/>
        </svg>
      </button>
      <div class="filter-chips" id="filter-degree"></div>
    </div>

    <div class="filter-group collapsed" data-group="media">
      <button class="filter-group-label" onclick="toggleFilterGroup(this)">
        36氪报道
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="m6 9 6 6 6-6"/>
        </svg>
      </button>
      <div class="filter-chips" id="filter-media"></div>
    </div>
  </aside>

  <section class="results-area">
    <div class="results-toolbar">
      <div class="sort-select">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="sort-icon">
          <path d="M3 6h18M6 12h12M9 18h6"/>
        </svg>
        <select id="sortBy" onchange="applyFilters()">
          <option value="default">综合排序</option>
          <option value="funding">融资额 ↓</option>
          <option value="year">成立时间 ↓</option>
          <option value="jobs">职位数 ↓</option>
          <option value="name">名称 A-Z</option>
        </select>
      </div>
      <div class="view-tabs">
        <button class="view-tab active" data-view="card" onclick="setView('card')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          卡片
        </button>
        <button class="view-tab" data-view="table" onclick="setView('table')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          列表
        </button>
      </div>
    </div>

    <div class="company-grid" id="companyGrid"></div>

    <div class="company-table-wrap" id="companyTable" style="display:none">
      <table>
        <thead>
          <tr>
            <th>公司</th><th>行业</th><th>融资</th><th>地区</th><th>成立</th><th>标签</th><th>职位</th><th></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="empty-state" id="emptyState" style="display:none">
      <div class="empty-illustration">
        <svg viewBox="0 0 120 120" fill="none"><circle cx="60" cy="45" r="20" stroke="currentColor" stroke-width="2" opacity="0.3"/><path d="M30 100c0-16.6 13.4-30 30-30s30 13.4 30 30" stroke="currentColor" stroke-width="2" opacity="0.3"/><rect x="38" y="70" width="44" height="8" rx="4" fill="currentColor" opacity="0.15"/><rect x="42" y="82" width="36" height="6" rx="3" fill="currentColor" opacity="0.1"/></svg>
      </div>
      <p class="empty-title">没有匹配的公司</p>
      <p class="empty-desc">调整筛选条件，或者清空筛选重新探索</p>
      <button class="btn-primary" onclick="resetFilters()">清除筛选</button>
    </div>
  </section>
</main>

<div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
  <div class="modal-panel" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <div id="modalBody"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
