<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobRadar — 打破求职信息差</title>
<meta name="description" content="发现隐形好公司，抹平求职信息差。按行业、融资、规模、地区筛选优质企业，查看实时招聘信息。">
<link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="container">
    <h1 class="logo">🔍 JobRadar <span class="subtitle">打破求职信息差</span></h1>
    <p class="tagline">你不知道的好公司，这里都能找到。资质平平也能进好公司——因为你知道别人不知道的。</p>
  </div>
</header>

<!-- Filter Bar -->
<div class="filter-bar" id="filterBar" style="min-height:44px">
  <div class="container">
    <div class="filter-bar-inner">
      <!-- Search -->
      <div class="filter-search">
        <span class="search-icon">🔎</span>
        <input type="text" id="nameSearch" class="search-input" 
               placeholder="搜索公司名称..." oninput="applyFilters()">
      </div>
      
      <!-- Filter dropdowns (populated by JS) -->
      <div class="filter-dropdowns" id="filterDropdowns"></div>
      
      <!-- Reset -->
      <button class="btn-reset" onclick="resetFilters()" id="btnReset" style="display:none">✕ 重置</button>
    </div>
    
    <!-- Active filter tags -->
    <div class="active-tags" id="activeTags"></div>
  </div>
</div>

<main class="container">
  <!-- Stats Bar -->
  <div class="stats-bar" id="statsBar">
    <span id="companyCount">0</span> 家公司 ·
    <span id="jobCount">0</span> 个职位 ·
    <span id="bestEmployerCount" style="color:#be185d">0</span> 最佳雇主
  </div>

  <!-- Results -->
  <section class="results" id="results">
    <div class="results-header">
      <div class="sort-group">
        <label>排序：</label>
        <select id="sortBy" onchange="applyFilters()">
          <option value="default">综合排序</option>
          <option value="funding">融资额 ↓</option>
          <option value="year">成立时间 ↓</option>
          <option value="jobs">职位数 ↓</option>
          <option value="name">名称 A-Z</option>
        </select>
      </div>
      <div class="view-toggle">
        <button class="btn-view active" data-view="card" onclick="setView('card')">📋 卡片</button>
        <button class="btn-view" data-view="table" onclick="setView('table')">📊 表格</button>
      </div>
    </div>

    <div class="company-grid" id="companyGrid"></div>

    <div class="company-table-wrap" id="companyTable" style="display:none">
      <table>
        <thead>
          <tr>
            <th>公司名称</th>
            <th>行业</th>
            <th>融资轮次</th>
            <th>地区</th>
            <th>成立</th>
            <th>优势</th>
            <th>最佳雇主</th>
            <th>职位</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="empty-state" id="emptyState" style="display:none">
      <p class="empty-icon">🔍</p>
      <p>没有匹配的公司，试试调整筛选条件</p>
      <button class="btn-primary" onclick="resetFilters()">重置筛选</button>
    </div>
  </section>

  <div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modalBody"></div>
    </div>
  </div>
</main>

<!-- Donate -->
<section class="donate-section" style="text-align:center;padding:32px 16px;background:var(--bg-card,#fff);border-top:1px solid var(--border,#e5e7eb)">
  <div class="container">
    <h3 style="margin:0 0 8px;font-size:1.15rem">☕ 觉得有用？请喝杯咖啡</h3>
    <p style="color:var(--text-secondary,#6b7280);margin:0 0 20px;font-size:0.9rem">微信扫一扫，支持 JobRadar 持续更新</p>
    <img src="images/wechat-pay.jpg" alt="微信赞赏码" 
         style="width:200px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.1)">
  </div>
</section>

<footer class="footer">
  <div class="container">
    <p>JobRadar — 数据来源：公开融资信息、招聘平台、企业官网 | 帮助求职者抹平信息差</p>
    <p class="footer-meta">如果对你有用，⭐ <a href="https://github.com/yucben/job-radar" target="_blank">GitHub</a></p>
  </div>
</footer>

<script src="js/data.js?v=3"></script>
<script src="js/app.js?v=3"></script>
</body>
</html>
